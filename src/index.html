<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Nintendo Land Reimagined Prototype</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root,
            [data-theme="light"] {
                --font-display: "Orbitron", sans-serif;
                --font-body: "Inter", sans-serif;
                --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
                --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
                --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
                --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
                --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
                --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
                --space-1: 0.25rem;
                --space-2: 0.5rem;
                --space-3: 0.75rem;
                --space-4: 1rem;
                --space-5: 1.25rem;
                --space-6: 1.5rem;
                --space-8: 2rem;
                --space-10: 2.5rem;
                --space-12: 3rem;
                --radius-sm: 0.375rem;
                --radius-md: 0.5rem;
                --radius-lg: 0.75rem;
                --radius-xl: 1rem;
                --radius-full: 9999px;
                --color-bg: #0c1014;
                --color-surface: rgba(14, 19, 28, 0.86);
                --color-surface-2: rgba(21, 28, 39, 0.93);
                --color-surface-offset: rgba(28, 36, 49, 0.92);
                --color-border: rgba(163, 196, 212, 0.18);
                --color-divider: rgba(163, 196, 212, 0.12);
                --color-text: #edf4fa;
                --color-text-muted: #acc0cf;
                --color-text-faint: #708295;
                --color-primary: #30d5c8;
                --color-primary-hover: #21b7ab;
                --color-blue: #59a9ff;
                --color-gold: #f5c451;
                --color-error: #ff6b88;
                --color-success: #6ecb7d;
                --shadow-md: 0 12px 32px rgba(0, 0, 0, 0.28);
                --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.38);
                --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
            }
            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                min-height: 100%;
            }
            body {
                font-family: var(--font-body);
                font-size: var(--text-base);
                color: var(--color-text);
                background:
                    radial-gradient(
                        circle at top,
                        rgba(48, 213, 200, 0.14),
                        transparent 28%
                    ),
                    radial-gradient(
                        circle at 80% 20%,
                        rgba(89, 169, 255, 0.12),
                        transparent 24%
                    ),
                    linear-gradient(
                        180deg,
                        #081017 0%,
                        #0b1015 55%,
                        #090d12 100%
                    );
                overflow: hidden;
            }
            button,
            select {
                font: inherit;
            }
            .app {
                display: grid;
                grid-template-columns: 320px 1fr;
                min-height: 100vh;
            }
            .sidebar,
            .overlay-card,
            .hud-panel,
            .modal {
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                box-shadow: var(--shadow-md);
                backdrop-filter: blur(16px);
            }
            .sidebar {
                padding: var(--space-6);
                border-right: 1px solid var(--color-divider);
                display: flex;
                flex-direction: column;
                gap: var(--space-5);
                overflow: auto;
            }
            .logo {
                display: flex;
                align-items: center;
                gap: var(--space-3);
            }
            .logo svg {
                width: 42px;
                height: 42px;
                color: var(--color-primary);
            }
            .eyebrow {
                color: var(--color-primary);
                text-transform: uppercase;
                letter-spacing: 0.18em;
                font-size: var(--text-xs);
            }
            h1,
            h2,
            h3 {
                margin: 0;
                line-height: 1.1;
            }
            h1 {
                font-family: var(--font-display);
                font-size: var(--text-xl);
            }
            h2 {
                font-size: var(--text-lg);
            }
            h3 {
                font-size: var(--text-base);
            }
            p {
                margin: 0;
                color: var(--color-text-muted);
                max-width: 60ch;
            }
            .panel {
                background: var(--color-surface-2);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-lg);
                padding: var(--space-4);
            }
            .stack {
                display: flex;
                flex-direction: column;
                gap: var(--space-3);
            }
            .mode-grid,
            .role-grid {
                display: grid;
                gap: var(--space-3);
            }
            .chip-row {
                display: flex;
                flex-wrap: wrap;
                gap: var(--space-2);
            }
            .chip {
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                padding: 0.38rem 0.7rem;
                border-radius: var(--radius-full);
                background: rgba(48, 213, 200, 0.12);
                color: var(--color-text);
                font-size: var(--text-xs);
                border: 1px solid rgba(48, 213, 200, 0.22);
            }
            .mode-card,
            .role-card {
                width: 100%;
                text-align: left;
                cursor: pointer;
                border: none;
                border-radius: var(--radius-lg);
                padding: var(--space-4);
                background: linear-gradient(
                    180deg,
                    rgba(255, 255, 255, 0.03),
                    rgba(255, 255, 255, 0.01)
                );
                color: var(--color-text);
                border: 1px solid var(--color-border);
                transition:
                    transform var(--transition),
                    border-color var(--transition),
                    background var(--transition);
            }
            .mode-card:hover,
            .role-card:hover,
            .mode-card.active,
            .role-card.active {
                transform: translateY(-2px);
                border-color: rgba(48, 213, 200, 0.5);
                background: rgba(48, 213, 200, 0.11);
            }
            .mode-card small,
            .role-card small {
                display: block;
                color: var(--color-text-faint);
                margin-top: 0.45rem;
            }
            .controls {
                display: grid;
                gap: var(--space-2);
                color: var(--color-text-muted);
                font-size: var(--text-sm);
            }
            .controls kbd {
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.1);
                padding: 0.15rem 0.45rem;
                border-radius: 0.35rem;
                color: var(--color-text);
            }
            .main {
                position: relative;
                min-height: 100vh;
            }
            #gameCanvas {
                width: 100%;
                height: 100vh;
                display: block;
            }
            .hud {
                position: absolute;
                inset: 0;
                pointer-events: none;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                padding: var(--space-5);
            }
            .hud-top,
            .hud-bottom {
                display: flex;
                justify-content: space-between;
                gap: var(--space-4);
                align-items: flex-start;
            }
            .hud-bottom {
                align-items: flex-end;
            }
            .hud-panel {
                border-radius: var(--radius-lg);
                padding: var(--space-3) var(--space-4);
                max-width: min(420px, 100%);
            }
            .hud-title {
                font-family: var(--font-display);
                font-size: var(--text-sm);
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }
            .hud-value {
                font-size: var(--text-lg);
                font-weight: 700;
            }
            .menu-toggle {
                display: none;
                position: fixed;
                top: 0.75rem;
                left: 0.75rem;
                z-index: 60;
                border: 1px solid var(--color-border);
                background: var(--color-surface-2);
                color: var(--color-text);
                padding: 0.7rem 0.9rem;
                border-radius: 999px;
                box-shadow: var(--shadow-md);
            }
            .drawer-backdrop {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
                z-index: 40;
            }
            @media (max-width: 980px) {
                .menu-toggle {
                    display: inline-flex;
                }
                .shell {
                    grid-template-columns: 1fr;
                }
                .sidebar {
                    position: fixed;
                    inset: 0 auto 0 0;
                    width: min(88vw, 22rem);
                    transform: translateX(-102%);
                    transition: transform 0.25s ease;
                    z-index: 50;
                    box-shadow: var(--shadow-xl);
                }
                body.drawer-open .sidebar {
                    transform: translateX(0);
                }
                body.drawer-open .drawer-backdrop {
                    display: block;
                }
            }
        </style>
    </head>
    <body>
        <button
            class="menu-toggle"
            id="menuToggle"
            aria-label="Toggle menu"
            aria-expanded="false"
        >
            ☰ Menu
        </button>
        <div class="drawer-backdrop" id="drawerBackdrop"></div>
        <div class="shell">...</div>
        <script type="module" src="./js/main.js"></script>
    </body>
</html>
